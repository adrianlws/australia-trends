name: Daily scrape

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"   # 06:30 Sydney during AEST; adjust later if needed

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("dplyr","readr","stringr","purrr","lubridate","jsonlite","httr2","tidyr","janitor","here","xml2"), repos="https://cloud.r-project.org")'

      - name: Run daily scrape
        run: |
          Rscript scripts/run_daily_scrape.R

      - name: Commit scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          git diff --cached --quiet || git commit -m "Daily scrape data update"
          git push