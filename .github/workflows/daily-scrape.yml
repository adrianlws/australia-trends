name: Daily scrape

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::dplyr
            any::readr
            any::stringr
            any::purrr
            any::lubridate
            any::jsonlite
            any::httr2
            any::tidyr
            any::janitor
            any::xml2

      - name: Verify packages
        shell: Rscript {0}
        run: |
          pkgs <- c("dplyr","readr","stringr","purrr","lubridate","jsonlite","httr2","tidyr","janitor","xml2")
          ok <- vapply(pkgs, requireNamespace, quietly = TRUE, FUN.VALUE = logical(1))
          print(ok)
          if (!all(ok)) stop("Missing packages: ", paste(names(ok)[!ok], collapse = ", "))

      - name: Run daily scrape
        run: |
          Rscript scripts/run_daily_scrape.R

      - name: Commit scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          git diff --cached --quiet || git commit -m "Daily scrape data update"
          git push